name: Build ABL Superfastboot

on:
  workflow_dispatch:

# 强制使用 Node 24，消除底层警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential uuid-dev iasl git gcc-aarch64-linux-gnu \
        python3 python3-pip clang lld llvm xxd zip

    - name: Build Generic Version
      run: |
        echo "开始编译通用版..."
        make build_generic

    - name: Build Superfastboot Only Version
      run: |
        echo "开始编译纯净测试版..."
        make build_superfbonly

    - name: Build Local ABL Version
      run: |
        echo "开始编译本地修补版..."
        make build

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: All_Superfastboot_EFI_Binaries
        path: dist/*.efi
        if-no-files-found: error
